name: Build OT-RCP Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: esp32c6
            antenna: internal
            name: "ESP32-C6 Internal Antenna"
          - target: esp32c6
            antenna: external
            name: "ESP32-C6 External Antenna"
          - target: esp32h2
            antenna: internal
            name: "ESP32-H2 Internal Antenna"

    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-venv cmake libusb-1.0-0

      - name: Install esp-idf toolchain
        working-directory: esp-idf
        run: ./install.sh ${{ matrix.target }}

      - name: Patch antenna code (external only)
        if: matrix.antenna == 'external'
        run: |
          cp esp_ot_rcp.c \
            esp-idf/examples/openthread/ot_rcp/main/esp_ot_rcp.c

      - name: Set target and apply config
        working-directory: esp-idf/examples/openthread/ot_rcp
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          idf.py set-target ${{ matrix.target }}
          sed -i 's/CONFIG_OPENTHREAD_RCP_UART=y/# CONFIG_OPENTHREAD_RCP_UART is not set/' sdkconfig
          sed -i 's/# CONFIG_OPENTHREAD_RCP_USB_SERIAL_JTAG is not set/CONFIG_OPENTHREAD_RCP_USB_SERIAL_JTAG=y/' sdkconfig

      - name: Build firmware
        working-directory: esp-idf/examples/openthread/ot_rcp
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          idf.py build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ot-rcp-${{ matrix.target }}-${{ matrix.antenna }}
          path: esp-idf/examples/openthread/ot_rcp/build/esp_ot_rcp.bin
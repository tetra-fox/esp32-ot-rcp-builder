name: Build OT-RCP Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: esp32c6
            name: "ESP32-C6 (generic)"
            filename: "ot-rcp_esp32c6_generic"
          - target: esp32c6
            name: "ESP32-C6 (XIAO external antenna)"
            filename: "ot-rcp_esp32c6_xiao-external-antenna"
            xiao_antenna_patch: true
          - name: "ESP32-H2 (generic)"
            target: esp32h2
            filename: "ot-rcp_esp32h2_generic"

    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-venv cmake libusb-1.0-0

      - name: Install esp-idf toolchain
        working-directory: esp-idf
        run: ./install.sh ${{ matrix.target }}

      - name: Patch antenna code for XIAO ESP32-C6
        if: matrix.xiao_antenna_patch
        run: patch esp-idf/examples/openthread/ot_rcp/main/esp_ot_rcp.c < xiao-external-antenna_v6.0.patch

      - name: Set target and apply config
        working-directory: esp-idf/examples/openthread/ot_rcp
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          idf.py set-target ${{ matrix.target }}
          sed -i 's/CONFIG_OPENTHREAD_RCP_UART=y/# CONFIG_OPENTHREAD_RCP_UART is not set/' sdkconfig
          sed -i 's/# CONFIG_OPENTHREAD_RCP_USB_SERIAL_JTAG is not set/CONFIG_OPENTHREAD_RCP_USB_SERIAL_JTAG=y/' sdkconfig

      - name: Build firmware
        working-directory: esp-idf/examples/openthread/ot_rcp
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          idf.py build

      - name: Merge binaries
        working-directory: esp-idf/examples/openthread/ot_rcp
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          idf.py merge-bin -o ${{ matrix.filename }}.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.filename }}
          path: esp-idf/examples/openthread/ot_rcp/build/${{ matrix.filename }}.bin

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ot-rcp_*/*.bin
          tag_name: build-${{ steps.sha.outputs.short }}